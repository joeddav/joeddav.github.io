<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description | default: site.title }}">
    <style>
      :root {
        --bg: #fbfaf7;
        --fg: #1f2328;
        --muted: #68707a;
        --line: #d9d5cc;
        --line-soft: #ebe7de;
        --accent: #8a3d4f;
        --accent-soft: #f3e8ec;
        --maxw: 960px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 16px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .wrap {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 44px 24px 64px;
      }

      header.site-header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 24px;
        align-items: start;
        padding-bottom: 22px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1, h2, h3 {
        margin: 0;
        color: var(--fg);
        line-height: 1.2;
      }

      h1 {
        font-size: 56px;
        letter-spacing: 0;
      }

      h2 {
        font-size: 18px;
        letter-spacing: 0;
      }

      h3 {
        font-size: 16px;
      }

      p {
        margin: 0;
      }

      .intro {
        max-width: 700px;
        margin-top: 18px;
        color: #30353b;
        font-size: 18px;
      }

      .intro + .intro {
        margin-top: 10px;
      }

      .link-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px 14px;
        max-width: 260px;
        padding-top: 6px;
        font-size: 14px;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
        text-underline-offset: 0.16em;
      }

      section {
        padding: 28px 0;
        border-bottom: 1px solid var(--line-soft);
      }

      section:last-child {
        border-bottom: 0;
      }

      .section-title {
        display: grid;
        grid-template-columns: 140px minmax(0, 1fr);
        gap: 22px;
        margin-bottom: 14px;
      }

      .section-title h2 {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .section-title p {
        max-width: 660px;
        color: var(--muted);
        font-size: 14px;
      }

      .rows {
        display: grid;
        gap: 0;
      }

      .row {
        display: grid;
        grid-template-columns: 140px minmax(0, 1fr);
        gap: 22px;
        padding: 12px 0;
        border-top: 1px solid var(--line-soft);
      }

      .row:first-child {
        border-top: 0;
      }

      .date,
      .kind,
      .meta,
      .note,
      footer {
        color: var(--muted);
        font-size: 13px;
      }

      .date,
      .kind {
        padding-top: 2px;
      }

      .item-title {
        font-weight: 650;
      }

      .subtitle,
      .description,
      .authors {
        margin-top: 3px;
      }

      .subtitle {
        color: #363b41;
        font-size: 14px;
      }

      .description,
      .authors {
        color: var(--muted);
        font-size: 14px;
      }

      .meta,
      .note {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 999px;
        background: var(--accent-soft);
      }

      .meta {
        margin-top: 6px;
      }

      .note-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }

      .compact-list {
        columns: 2;
        column-gap: 40px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .compact-list li {
        break-inside: avoid;
        margin: 0 0 12px;
      }

      footer {
        padding-top: 24px;
      }

      @media (max-width: 720px) {
        .wrap {
          padding: 28px 18px 48px;
        }

        header.site-header,
        .section-title,
        .row {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .link-row {
          justify-content: flex-start;
          max-width: none;
        }

        .intro {
          font-size: 16px;
        }

        h1 {
          font-size: 34px;
        }

        .date,
        .kind {
          padding-top: 0;
        }

        .compact-list {
          columns: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      {{ content }}
      <footer>
        Last updated {{ site.time | date: "%Y" }}. Built as a small static page.
      </footer>
    </main>
  </body>
</html>
